<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="nev-logo">
                <div class="logo"></div>
            </div>
            <div class="nav-search">
                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <input placeholder="Search for Movies, Events, Plays, Sports and Activities" class="search-input">
            </div>  
            <div class="location">
                <select class="location">
                    <option > NCT DELHI</option>
                </select>
            </div>
            <div class="profile">
                <div class="profile-icon">
                    <i class="fa-solid fa-circle-user" style="color: rgb(11, 11, 12);"></i>
                </div>
                <p>HI, GUEST</p>
               
            </div>
        </div>
        <div class="pannel">
                <div class="pannel-left pan">
                    <p>Movies</p>
                    <p>Stream</p>
                    <p>Event</p>
                    <p>Plays</p>
                    <p>Sports</p>
                    <p>Activities</p>
                </div>
                <div class="pannel-right pan">
                    <p>ListYourShow</p>
                    <p>Corporates</p>
                    <p>Offers</p>
                    <p>Gift Cards</p>
                </div>
            </div>
    </header>
</body>
</html>
